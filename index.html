<script>
  (function () {
    try {
      const stored = localStorage.getItem('theme');
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const useDark = stored ? stored === 'dark' : prefersDark;
      if (useDark) {
        document.documentElement.classList.add('darkmode-active');
      }
    } catch (e) {
    }
  })();
</script>

  <main id="main" class="main ">
    
<div class="form">
	<form class="pure-form" id="color-entry-form" action="#" method="post" name="color-entry-form">
		<div class="labels">
			<div class="form-warning" id="warning" role="alert" aria-live="polite">Please enter at least one valid hex color.</div>
			<h2><label class="textarea-label" for="color-values">Enter hex colors (separated by spaces)</label></h2>
		</div>
		<div class="input">
			<textarea id="color-values" name="color-values" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"></textarea>
			<div class="color-picker-wrapper">
				<button id="color-picker-button" class="color-picker-button" type="button" aria-label="Pick a color">
					<span aria-hidden="true">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-color-picker"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M11 7l6 6" /><path d="M4 16l11.7 -11.7a1 1 0 0 1 1.4 0l2.6 2.6a1 1 0 0 1 0 1.4l-11.7 11.7h-4v-4z" /></svg>
					</span>
					<span class="sr-only">Pick a color</span>
				</button>
				<input id="color-picker-input" class="color-picker-input" type="text" data-coloris autocomplete="off" aria-label="Pick a color" tabindex="-1" aria-hidden="true" inert>
			</div>
		</div>
		<input id="make" class="button" type="submit" value="Make tints and shades &nbsp;🎉">
	</form>
</div>
<div class="palettes">
	<div id="export-wrapper" class="export-wrapper" hidden>
		<div class="palette-actions" id="scroll-top">
			<div class="count-selector" role="group" aria-label="Steps per side">
				<button type="button" class="count-selector__option" data-count="5" aria-pressed="false" tabindex="-1">5</button>
				<button type="button" class="count-selector__option is-active" data-count="10" aria-pressed="true" tabindex="0">10</button>
				<button type="button" class="count-selector__option" data-count="20" aria-pressed="false" tabindex="-1">20</button>
			</div>
			<button id="copy-with-hashtag-toggle" class="action-button action-button--toggle icon-button" type="button" aria-pressed="false">
				<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-hash"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5 9l14 0" /><path d="M5 15l14 0" /><path d="M11 4l-4 16" /><path d="M17 4l-4 16" /></svg>
				<span class="sr-only">Show hashtags</span>
			</button>
			<div class="palette-actions__export">
				<button id="export-image" class="action-button icon-button" type="button" aria-label="Download palette image">
					<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-photo"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M15 8h.01" /><path d="M3 6a3 3 0 0 1 3 -3h12a3 3 0 0 1 3 3v12a3 3 0 0 1 -3 3h-12a3 3 0 0 1 -3 -3v-12z" /><path d="M3 16l5 -5c.928 -.893 2.072 -.893 3 0l5 5" /><path d="M14 14l1 -1c.928 -.893 2.072 -.893 3 0l3 3" /></svg>
				</button>
				<button id="export-open" class="action-button icon-button" type="button" aria-expanded="false" aria-controls="export-modal" aria-label="Export palettes">
					<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-download"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2" /><path d="M7 11l5 5l5 -5" /><path d="M12 4l0 12" /></svg>
				</button>
			</div>
		</div>
	</div>
	<div id="tints-and-shades"></div>
	
	<div id="copy-status" class="sr-only" aria-live="polite"></div>
</div>

<dialog id="export-modal" class="export-modal" aria-labelledby="export-title" aria-modal="true">
	<div class="export-modal-header">
		<h3 id="export-title">Export palettes</h3>
		<button id="export-close" class="export-close" type="button" aria-label="Close export dialog">
			<span aria-hidden="true">&times;</span>
		</button>
	</div>
	<div class="export-tabs" role="tablist" aria-label="Export format">
		
		
		
		<button class="export-tab is-active" type="button" role="tab" aria-selected="true" aria-controls="export-output" id="export-tab-hex" data-format="hex" >Hex</button>
		
		
		<button class="export-tab" type="button" role="tab" aria-selected="false" aria-controls="export-output" id="export-tab-hex-hash" data-format="hex-hash" tabindex="-1" >#Hex</button>
		
		
		<button class="export-tab" type="button" role="tab" aria-selected="false" aria-controls="export-output" id="export-tab-rgb" data-format="rgb" tabindex="-1" >RGB</button>
		
		
		<button class="export-tab" type="button" role="tab" aria-selected="false" aria-controls="export-output" id="export-tab-css" data-format="css" tabindex="-1" >CSS</button>
		
		
		<button class="export-tab" type="button" role="tab" aria-selected="false" aria-controls="export-output" id="export-tab-json" data-format="json" tabindex="-1" >JSON</button>
		
	</div>
	<div class="export-body" id="export-panels">
	<div class="export-output-wrap">
		<pre class="export-output" id="export-output" role="tabpanel" aria-labelledby="export-tab-hex"></pre>
	</div>
	</div>
	<div class="export-copy">

			</span>
		</button>
	</div>
</dialog>
