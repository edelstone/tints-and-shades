<script>
  (function () {
    try {
      const stored = localStorage.getItem('theme');
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const useDark = stored ? stored === 'dark' : prefersDark;
      if (useDark) {
        document.documentElement.classList.add('darkmode-active');
      }
    } catch (e) {
    }
  })();
</script>
<link rel="stylesheet" href="/css/styles.css">
<title>Tint and Shade Generator</title>

</head>

<body>
  <header class="header">
	<div class="preface">
		
		<a href="#color-values" class="offscreen">Jump to the form</a>
		
		<div class="dark-mode-selector">
			<button id="darkmode-toggle" class="theme-toggle" type="button" aria-pressed="false" aria-label="Dark mode" data-theme-state="light">
				<span class="theme-toggle__icon" aria-hidden="true"></span>
				<span class="theme-toggle__state sr-only" id="darkmode-text-toggle">Dark mode</span>
			</button>
		</div>
		<a href="https://github.com/edelstone/tints-and-shades" class="github-corner" aria-label="View source on GitHub">
			<svg width="80" height="80" viewBox="0 0 250 250" style="fill:#000; color:#fff;" aria-hidden="true">
				<path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
				<path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" style="transform-origin: 130px 106px;" class="octo-arm"></path>

			</svg>
		</a>
	</div>
	<div class="title">
		<h1><a href="/">Tint &amp; Shade Generator</a></h1>
		
	</div>
</header>

  <main id="main" class="main ">
    
<div class="form">
	<form class="pure-form" id="color-entry-form" action="#" method="post" name="color-entry-form">
		<div class="labels">
			<div class="form-warning" id="warning" role="alert" aria-live="polite">Please enter at least one valid hex color.</div>
			<h2><label class="textarea-label" for="color-values">Enter hex colors (separated by spaces)</label></h2>
		</div>
		<div class="input">
			<textarea id="color-values" name="color-values" autocomplete="off" autocapitalize="off" spellcheck="false"></textarea>
		</div>
		<input id="make" class="button" type="submit" value="Make tints and shades &nbsp;🎉">
	</form>
</div>
<div class="hashtag-selector" id="scroll-top">
	<label class="switch">
		<input type="checkbox" id="copy-with-hashtag">
		<span class="control"></span>
		<span class="label">Include hashtag when copying</span>
	</label>
</div>
<div class="ads">
	<script async type="text/javascript" src="//cdn.carbonads.com/carbon.js?serve=CW7ILKQU&placement=maketintsandshadescom&format=cover" id="_carbonads_js"></script>
</div>
<div class="palettes">
	<div id="tints-and-shades"></div>
	<div id="export-wrapper" class="export-wrapper" hidden>
		<button id="export-open" class="export-button" type="button" aria-expanded="false" aria-controls="export-modal">
			<span>Export all colors</span>
		</button>
	</div>
	<div id="copy-status" class="sr-only" aria-live="polite"></div>
</div>

<dialog id="export-modal" class="export-modal" aria-labelledby="export-title">
	<div class="export-modal-header">
		<h3 id="export-title">Export all colors</h3>
		<button id="export-close" class="export-close" type="button" aria-label="Close export dialog">
			<span aria-hidden="true">&times;</span>
		</button>
	</div>
	<div class="export-tabs" role="tablist" aria-label="Export format">
		
		
		
		<button class="export-tab is-active" type="button" role="tab" aria-selected="true" aria-controls="export-output" id="export-tab-hex" data-format="hex" >Hex</button>
		
		
		<button class="export-tab" type="button" role="tab" aria-selected="false" aria-controls="export-output" id="export-tab-hex-hash" data-format="hex-hash" tabindex="-1" >Hex with #</button>
		
		
		<button class="export-tab" type="button" role="tab" aria-selected="false" aria-controls="export-output" id="export-tab-css" data-format="css" tabindex="-1" >CSS</button>
		
		
		<button class="export-tab" type="button" role="tab" aria-selected="false" aria-controls="export-output" id="export-tab-json" data-format="json" tabindex="-1" >JSON</button>
		
	</div>
	<div class="export-body" id="export-panels">
		<div class="export-output-wrap">
			<pre class="export-output" id="export-output" role="tabpanel" aria-labelledby="export-tab-hex"></pre>
		</div>
	</div>
	<div class="export-copy">
		<button id="export-copy-fab" class="export-copy-button" type="button" aria-label="Copy export"></button>
	</div>
</dialog>


  </main>
  <footer class="footer">
